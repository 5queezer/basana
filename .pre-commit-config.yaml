# Pre-commit hooks for basana (Python async trading framework)
# Install: pre-commit install
# Run manually: pre-commit run --all-files

default_stages: [pre-commit]
fail_fast: false

repos:
  # ── Secrets & security ───────────────────────────────────────────────────
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args:
          - --exclude-files
          - ^(poetry\.lock|tests/.*)$

  # ── General file hygiene ─────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: detect-private-key
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: check-merge-conflict
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-json
      - id: check-yaml
      - id: check-toml
      - id: debug-statements
      - id: check-ast

  # ── Python QA ────────────────────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.6
    hooks:
      - id: bandit
        args: [-c, pyproject.toml, -q, -r, basana, samples]
        pass_filenames: false

  - repo: local
    hooks:
      - id: pytest-compile-smoke
        name: pytest collection smoke check
        entry: python -m pytest --collect-only -q
        language: system
        pass_filenames: false
        stages: [manual]
